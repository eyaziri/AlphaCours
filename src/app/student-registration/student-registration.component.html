
<div class="signup-container">
  <!-- Section Gauche -->
  <div class="left-section">
    <div class="logo">
      <h1>AlphaCours</h1>
    </div>
    <div class="illustration">
      <img src="../../assets/images/stud.png" alt="Illustration" />
    </div>
  </div>

  <!-- Section Droite -->
  <div class="right-section">
    <h2>Rejoindre notre équipe d’étudiants</h2>

    <!-- Formulaire -->
    <form>
      <div class="form-row">
        <input type="text" placeholder="Nom" required />
        <input type="text" placeholder="Prénom" required />
      </div>

      <input type="email" placeholder="Email" required />
      <input type="text" placeholder="Spécialité" required />
      <input type="password" placeholder="Mot de passe" required />

      <button type="submit" class="btn-submit">Créer un compte</button>
    </form>

    <!-- Connexion avec Google et Facebook -->
    <div class="social-login">
      <span>ou</span>
      <button class="btn-social google">
        <img src="../../assets/images/google-removebg-preview.png" alt="Google" />
        Se connecter avec Gmail
      </button>
      <button class="btn-social facebook">
        <img src="../../assets/images/face-removebg-preview.png" alt="Facebook" />
        Se connecter avec Facebook
      </button>
    </div>
  </div>
</div>
